name: Simplicity Guardian

on:
  pull_request:
    branches:
      - main

jobs:
  guard:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Install dependencies
        run: npm ci

      - name: Run simplicity guardian
        run: node bin/simplicity-guardian.js --format json > /tmp/guardian.json || true

      - name: Run ESLint (JSON output)
        run: npm run lint -- --format json > /tmp/lint.json || true

      - name: Post PR comment and evaluate result
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');

            function safeReadJson(filePath, fallback) {
              try {
                const content = fs.readFileSync(filePath, 'utf8');
                return JSON.parse(content);
              } catch (_err) {
                return fallback;
              }
            }

            const guardianResult = safeReadJson('/tmp/guardian.json', { violations: [], summary: { total: 0, byLayer: { 'zero-dependency': 0, 'dark-magic': 0, 'fan-out': 0 } } });
            const lintResult = safeReadJson('/tmp/lint.json', []);

            const script = require('./.github/scripts/post-pr-comment.cjs');
            const hasViolations = await script({ github, context, core, guardianResult, lintResult });

            if (hasViolations) {
              core.setFailed('Simplicity violations found — see PR comment for details');
            }
